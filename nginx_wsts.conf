# ── wsts.spatcyber.com — Windows Security Threat Scanner ─────────────────────
# Static landing page + signed executable downloads.
# Hardened for SSL Labs A+, SecurityHeaders.com A+, and Mozilla Observatory A+.

# ── HTTP → HTTPS redirect + ACME challenge ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name wsts.spatcyber.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wsts.spatcyber.com;

    root /home/ubuntu/wsts;
    index index.html;

    # ── TLS cert (certbot / Let's Encrypt; or ACM if behind ALB) ────────────
    ssl_certificate     /etc/letsencrypt/live/wsts.spatcyber.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wsts.spatcyber.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # TLS hardening (A+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Remove server banner
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # ── Security headers (apply to all responses) ───────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), xr-spatial-tracking=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # CSP — strict A+: external CSS/JS via 'self' only, no inline, no eval.
    # connect-src 'self' allows the JS to fetch /downloads/release.json.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; manifest-src 'self'; upgrade-insecure-requests" always;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/wsts.spatcyber.com.access.log;
    error_log  /var/log/nginx/wsts.spatcyber.com.error.log;

    # ── Downloads: signed executables + manifest ────────────────────────────
    # Force download of binaries; never let them be interpreted/executed inline.
    location /downloads/ {
        alias /home/ubuntu/wsts/downloads/;
        autoindex off;

        # release.json must always be fresh so the page shows the latest hash.
        location = /downloads/release.json {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            default_type application/json;
        }

        # Executables + checksums: force attachment, long cache (immutable).
        location ~* \.(exe|sha256|msi|zip)$ {
            add_header Content-Disposition "attachment" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, max-age=86400" always;
            default_type application/octet-stream;
        }
    }

    # ── Static assets — long cache, immutable ───────────────────────────────
    location /static/ {
        alias /home/ubuntu/wsts/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── security.txt (RFC 9116) ─────────────────────────────────────────────
    location = /security.txt        { alias /home/ubuntu/wsts/security.txt; default_type "text/plain"; }
    location = /.well-known/security.txt { alias /home/ubuntu/wsts/security.txt; default_type "text/plain"; }

    # ── robots.txt ──────────────────────────────────────────────────────────
    location = /robots.txt {
        alias /home/ubuntu/wsts/robots.txt;
        access_log off;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ── Landing page + everything else ──────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
