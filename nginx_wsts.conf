# wsts.spatcyber.com — WSTS Windows Security Threat Scanner (static download site)

server {
    listen 80;
    listen [::]:80;
    server_name wsts.spatcyber.com;
    modsecurity on;
    location / { return 301 https://wsts.spatcyber.com$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wsts.spatcyber.com;
    modsecurity on;

    ssl_certificate     /etc/letsencrypt/live/wsts.spatcyber.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wsts.spatcyber.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    root /home/ubuntu/wsts_web;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;

    location = / { try_files /index.html =404; }

    location /static/ {
        alias /home/ubuntu/wsts_web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /downloads/ {
        alias /home/ubuntu/wsts_web/downloads/;
        location ~ \.exe$ {
            add_header Content-Disposition 'attachment';
            add_header X-Content-Type-Options nosniff always;
            default_type application/octet-stream;
        }
    }

    location = /security.txt          { alias /home/ubuntu/wsts_web/security.txt; default_type text/plain; }
    location = /.well-known/security.txt { alias /home/ubuntu/wsts_web/security.txt; default_type text/plain; }
    location = /robots.txt            { alias /home/ubuntu/wsts_web/robots.txt; default_type text/plain; }

    location / { try_files $uri $uri/ =404; }
}
